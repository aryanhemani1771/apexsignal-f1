name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --dev

      # Static analysis of OUR code stays strict (fails the build).
      - name: Bandit (static analysis)
        run: uv run bandit -q -r src

      # Third-party dependency CVEs are advisory here: they live in packages we don't control,
      # new advisories appear constantly, and this is a portfolio repo (not continuously
      # patched). Reported for visibility, but does not fail the badge.
      - name: pip-audit (dependency vulnerabilities, advisory)
        continue-on-error: true
        run: uv run pip-audit
