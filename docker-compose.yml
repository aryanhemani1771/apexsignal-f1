# ApexSignal F1 — local stack.
# `docker compose up --build` brings up the dashboard (fixture mode) + API.
# Redis is optional and only used once live event distribution is enabled (Phase 5+).
services:
  dashboard:
    build: .
    image: apexsignal-f1:latest
    command: >
      uv run streamlit run dashboard/app.py
      --server.address=0.0.0.0 --server.port=8501 --server.headless=true
    environment:
      APP_MODE: ${APP_MODE:-fixture}
      EXECUTION_MODE: ${EXECUTION_MODE:-paper}
      ENABLE_LIVE_TRADING: "false"
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    build: .
    image: apexsignal-f1:latest
    command: >
      uv run uvicorn apexsignal.api.main:app
      --host 0.0.0.0 --port 8000
    environment:
      APP_MODE: ${APP_MODE:-fixture}
      EXECUTION_MODE: ${EXECUTION_MODE:-paper}
      ENABLE_LIVE_TRADING: "false"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles: ["api"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["live"]
